# To install, copy to ~/.config/dux/agents/support-bot/agent.yaml
name: "support-bot"
provider: "ollama-local"
workflow:
  default_mode: "triage"
  modes:
    - name: "triage"
      use: "conversation"
      context:
        system: |
          You are a Tier 3 Support Bot. Gather context from the user and triage their issue.
          If the issue requires a codebase change, you must transition to the architect mode to plan the fix.
        tools:
          - name: "stdlib"
            enabled: true
            requirements:
              supervision: false
      transitions:
        - to: "architect"
          description: "Transition to the planning architect when a code fix needs to be designed."

    - name: "architect"
      use: "planning"
      context:
        tools:
          - name: "stdlib"
            enabled: true
            requirements:
              supervision: false
          - name: "filesystem" # The architect can read files to plan, but should require review to write.
            enabled: true
            requirements:
              supervision: "tool_name == 'file_write' || tool_name == 'file_patch'"
      transitions:
        - to: "builder"
          description: "Use this once the step-by-step checklist is complete so the execution agent can write the code."
        - to: "triage"
          description: "Use this if you need more information from the user."

    - name: "builder"
      use: "execution"
      provider: "claude-3-opus" # Override with a highly capable model for complex coding
      context:
        tools:
          - name: "bash"
            enabled: true
            requirements:
              supervision: false # Autonomous execution
          - name: "filesystem"
            enabled: true
            requirements:
              supervision: false # Autonomous execution
      transitions:
        - to: "reviewer"
          description: "Use this to submit your code changes for QA review."
        - to: "triage"
          description: "Use this to ask the user to unblock you if an error is unsolvable."

    - name: "reviewer"
      use: "review"
      context:
        tools:
          - name: "bash"
            enabled: true
            requirements:
              supervision: "!(args.command.startsWith('go test') || args.command.startsWith('make test'))" # Run tests autonomously, flag everything else
      transitions:
        - to: "builder"
          description: "Use this to send the code back to the builder with failing feedback."
        - to: "triage"
          description: "Use this to notify the user that the task is complete and verified."
