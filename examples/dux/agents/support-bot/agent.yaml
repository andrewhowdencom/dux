# To install, copy to ~/.config/dux/agents/support-bot/agent.yaml
name: "support-bot"
provider: "ollama-local"
workflow:
  default_mode: "orchestrator"
  modes:
    - name: "orchestrator"
      use: "orchestrator"
      context:
        system: |
          You are the lead Support Orchestrator. 
          Gather context from the user and triage their issue, delegating tasks to specialize sub-agents.
        tools:
          - name: "stdlib"
            enabled: true
      transitions:
        - to: "architect"
          description: "Delegate to the planning architect to design a codebase fix."
        - to: "builder"
          description: "Delegate to the builder to write code based on the architect's plan."
        - to: "reviewer"
          description: "Delegate code verification to the QA reviewer."

    - name: "architect"
      use: "planning"
      context:
        tools:
          - name: "stdlib"
            enabled: true
            requirements:
              supervision: false
          - name: "filesystem" # The architect can read files to plan, but should require review to write.
            enabled: true
            requirements:
              supervision: "tool_name == 'file_write' || tool_name == 'file_patch'"
      transitions:
        - to: "orchestrator"
          description: "Yield control back to the orchestrator with a comprehensive Markdown summary of the architectural plans."

    - name: "builder"
      use: "execution"
      provider: "claude-3-opus" # Override with a highly capable model for complex coding
      context:
        tools:
          - name: "bash"
            enabled: true
            requirements:
              supervision: false # Autonomous execution
          - name: "filesystem"
            enabled: true
            requirements:
              supervision: false # Autonomous execution
      transitions:
        - to: "orchestrator"
          description: "Yield control back to the orchestrator with a detailed summary of exact code modifications and tests run."

    - name: "reviewer"
      use: "review"
      context:
        tools:
          - name: "bash"
            enabled: true
            requirements:
              supervision: "!(args.command.startsWith('go test') || args.command.startsWith('make test'))" # Run tests autonomously, flag everything else
      transitions:
        - to: "orchestrator"
          description: "Yield control back to the orchestrator with passing/failing QA review feedback."