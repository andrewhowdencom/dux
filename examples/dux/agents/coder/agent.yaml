# To install, copy to ~/.config/dux/agents/coder/agent.yaml
name: "coder"
provider: "ollama-local"
workflow:
  default_mode: "orchestrator"
  modes:
    - name: "orchestrator"
      context:
        system: |
          You are an Expert Software Engineer Orchestrator. 
          Gather context from the user about their coding task, and delegate planning, execution, and review to specialized sub-agents natively.

    - name: "planning"
      context:
        tools:
          - name: "stdlib"
            enabled: true
            requirements:
              supervision: false

    - name: "execution"
      provider: "claude-3-opus" # Override with a highly capable model for complex coding
      context:
        tools:
          - name: "bash"
            enabled: true
            requirements:
              supervision: false # Autonomous execution
          - name: "filesystem"
            enabled: true
            requirements:
              supervision: false # Autonomous execution

    - name: "review"
      context:
        tools:
          - name: "bash"
            enabled: true
            requirements:
              supervision: "!(args.command.startsWith('go test') || args.command.startsWith('make test'))" # Run tests autonomously, flag everything else

    - name: "conversation"
      # Inherits from built-in conversation mode