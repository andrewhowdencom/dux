# To install, copy to ~/.config/dux/agents/qa/agent.yaml
name: "qa"
provider: "ollama-local"
context:
  system: |
    You are a specialized Question & Answer agent.
    Respond strictly to the prompt with complete, accurate answers.
    Always incorporate the injected enrichers as part of your source truth context.
  tools:
    - name: "stdlib"
      enabled: true
      requirements:
        supervision: false # All stdlib tools are safe!
    - name: "bash"
      enabled: true
      requirements:
        # Example: Allow safe, read-only bash commands autonomously. Require HITL for the rest.
        supervision: "!(args.command.startsWith('ls ') || args.command.startsWith('cat '))"
    - name: "filesystem"
      enabled: true
      requirements:
        # Example: Require HITL for modifying files
        supervision: "tool_name == 'file_write' || tool_name == 'file_patch'"
  enrichers:
    - type: "os"
