site_name: Dux Documentation
site_description: Fast harness for agents. Latin for "guide".
site_url: ""

theme:
  name: material
  icon:
    logo: material/bird
  custom_dir: docs/overrides
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode

docs_dir: docs

nav:
  - Home: index.md
  - Tutorials:
    - "Integrating LiteLLM": tutorials/litellm.md
  - How-To Guides:
    - "Running Locally": how-to/running-locally.md
  - Reference:
    - "CLI Commands": reference/cli.md
  - Explanation:
    - "Application Architecture": explanation/architecture.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
