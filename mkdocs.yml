site_name: Dux Documentation
site_description: Fast harness for agents. Latin for "guide".
site_url: "https://dux.lahb.work"

theme:
  name: material
  icon:
    logo: material/bird
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: amber
      accent: orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: amber
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode

docs_dir: docs

nav:
  - Home: index.md
  - Tutorials:
    - "Integrating LiteLLM": tutorials/litellm.md
    - "Customer Feedback Agent": tutorials/customer-feedback-agent.md
    - "Customer Support Agent": tutorials/customer-support-agent.md
    - "Migration Agent": tutorials/migration-agent.md
    - "Guild Management Agent": tutorials/guild-management-agent.md
    - "Product Marketing Agent": tutorials/product-marketing-agent.md
    - "Q&A Bot Agent": tutorials/qa-bot-agent.md
    - "Helpful Assistant (Clippy)": tutorials/clippy-agent.md
  - How-To Guides:
    - "Running Locally": how-to/running-locally.md
    - "Configuring Agents": how-to/configuring-agents.md
    - "Configuring MCP Servers": how-to/configuring-mcp.md
    - "Configuring Slack UI": how-to/slack-ui.md
    - "Using as Go Library": how-to/using-as-library.md
  - Reference:
    - "CLI Commands": reference/cli.md
  - Explanation:
    - "Application Architecture": explanation/architecture.md

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - toc:
      permalink: true
