# config.example.yaml
# Provide this configuration (e.g., standard XDG compliant locations like ~/.config/dux/config.yml) to configure core services.

llm:
  # The default provider to use if `--provider` flag is completely omitted.
  # (If this is omitted, dux will attempt to use the first configured provider below)
  default_provider: "ollama-local"

  providers:
    # A standard Ollama local deployment targeting the native daemon
    - id: "ollama-local"
      type: "ollama"
      config:
        address: "http://localhost:11434"
        model: "gpt-oss:20b"
        # Optional: override attention window limit for large schemas.
        num_ctx: 8192

    # A standard Gemini API deployment targeting Google AI Studio
    - id: "gemini-api"
      type: "gemini"
      config:
        api_key: "AIzaSyYourAPIKeyHere..."
        model: "gemini-3-flash-preview"

    # A generic testing sandbox provider backing the core integration layer
    - id: "static-fallback"
      type: "static"
      config: {}

ui:
  - type: "telegram"
    agent: "pirate"
    configuration:
      # The API Token provided by BotFather
      token: "123456:ABC-DEF1234ghIkl-zyx57W2v1u123ew11"
      # Optional public HTTPS URL for receiving webhooks. If unset, long-polling is used.
      webhook_url: ""
      # Array of allowed integer Chat IDs. Users not in this list will be ignored.
      allowed_users:
        - 123456789

  - type: "web"
    # Provide the agent target id here for the web ui to adhere to.
    agent: "pirate"
    configuration:
      address: ":8080"
